<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found — The Nautisk</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Georgia, serif; background: #03213a; color: #e8eef4; min-height: 100vh; display: flex; flex-direction: column; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2.5rem; border-bottom: 1px solid #1a4a6e; background: #03213a; }
.nav-logo { font-size: 18px; font-weight: bold; letter-spacing: 0.14em; color: #c0cfe0; text-decoration: none; font-family: 'Inter', Arial, sans-serif; }
.nav-logo span { color: #8ab4d4; }
.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; text-align: center; }
.error-anchor { font-size: 64px; margin-bottom: 1.5rem; display: block; }
.error-code { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: #4a7fa8; font-family: 'Inter', Arial, sans-serif; margin-bottom: 1rem; }
h1 { font-size: 36px; font-weight: normal; color: #d6e8f5; margin-bottom: 1rem; line-height: 1.3; }
p { font-size: 16px; color: #7a9bb8; line-height: 1.8; font-family: 'Inter', Arial, sans-serif; max-width: 480px; margin: 0 auto 2rem; }
.btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn-home { display: inline-block; padding: 0.75rem 1.75rem; background: #4a7fa8; color: #fff; text-decoration: none; font-family: 'Inter', Arial, sans-serif; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 3px; transition: opacity 0.2s; }
.btn-home:hover { opacity: 0.85; }
.btn-back { display: inline-block; padding: 0.75rem 1.75rem; background: transparent; color: #8ab4d4; text-decoration: none; font-family: 'Inter', Arial, sans-serif; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 3px; border: 1px solid #1a4a6e; transition: border-color 0.2s; }
.btn-back:hover { border-color: #4a7fa8; }
.wave { margin-top: 3rem; opacity: 0.15; }
footer { border-top: 1px solid #1a4a6e; padding: 1.25rem 2.5rem; text-align: center; font-family: 'Inter', Arial, sans-serif; font-size: 12px; color: #4a7fa8; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">THE <span>NAUTISK</span></a>
</nav>
<div class="main">
  <span class="error-anchor">⚓</span>
  <div class="error-code">404 — Page Not Found</div>
  <h1>This page has drifted<br>off course.</h1>
  <p>The page you're looking for doesn't exist or may have been moved. Let's get you back to shore.</p>
  <div class="btn-group">
    <a href="index.html" class="btn-home">Return Home</a>
    <a href="javascript:history.back()" class="btn-back">Go Back</a>
  </div>
  <svg class="wave" viewBox="0 0 600 60" width="600" xmlns="http://www.w3.org/2000/svg">
    <path fill="none" stroke="#4a7fa8" stroke-width="2" d="M0,30 C75,10 150,50 225,30 C300,10 375,50 450,30 C525,10 562,40 600,30"/>
    <path fill="none" stroke="#4a7fa8" stroke-width="1" d="M0,45 C75,28 150,58 225,45 C300,28 375,58 450,45 C525,28 562,50 600,45"/>
  </svg>
</div>
<footer>© 2026 The Nautisk. All rights reserved. — <a href="index.html" style="color:#4a7fa8;">Return to home</a></footer>
</body>
</html>
